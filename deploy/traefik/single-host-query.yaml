# Template for exposing several bare-metal psstd nodes behind one hostname.
#
# Browser URLs look like:
# - https://psstd.example.com/?psstd_node=node-a
# - https://psstd.example.com/?psstd_node=node-b
#
# On each bare-metal node, advertise the shared host with that node's query key:
# PSSTD_ADVERTISE_HTTP=https://psstd.example.com/?psstd_node=node-a
#
# Traefik routes by query parameter before forwarding the request, so hot-potato
# refreshes and peer links still land on the intended node without per-node DNS.
# Requests without a matching psstd_node value fall back to psstd-any. Keep that
# Endpoints list limited to nodes that should receive unrouted fallback traffic.
apiVersion: v1
kind: Service
metadata:
  name: psstd-node-a
  namespace: default
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: psstd-node-a
  namespace: default
subsets:
  - addresses:
      - ip: 10.0.1.25
    ports:
      - name: http
        port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: psstd-node-b
  namespace: default
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: psstd-node-b
  namespace: default
subsets:
  - addresses:
      - ip: 10.0.1.26
    ports:
      - name: http
        port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: psstd-any
  namespace: default
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Endpoints
metadata:
  name: psstd-any
  namespace: default
subsets:
  - addresses:
      - ip: 10.0.1.25
      - ip: 10.0.1.26
    ports:
      - name: http
        port: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: psstd
  namespace: default
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`psstd.example.com`) && Query(`psstd_node`, `node-a`)
      kind: Rule
      priority: 100
      services:
        - name: psstd-node-a
          port: 8080
    - match: Host(`psstd.example.com`) && Query(`psstd_node`, `node-b`)
      kind: Rule
      priority: 100
      services:
        - name: psstd-node-b
          port: 8080
    - match: Host(`psstd.example.com`)
      kind: Rule
      priority: 1
      services:
        - name: psstd-any
          port: 8080
  tls: {}
